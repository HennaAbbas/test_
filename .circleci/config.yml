version: 2.1

orbs:
  slack: circleci/slack@4.12.5

workflows:
  my-workflow:
    jobs:
      - build
      - test:
          requires:
            - build
      - deploy:
          requires:
            - build
            - test
      - notify-cancelled:
          requires:
            - build
            - test
            - deploy
          requires-status: cancelled
      - notify-failed:
          requires:
            - build
            - test
            - deploy
          requires-status: failed

jobs:
  build:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run: echo "Building..."
      # Uncomment to demo failure:
      # - run: exit 1

  test:
    docker:
      - image: cimg/base:stable
    steps:
      - run: echo "Testing..."

  deploy:
    docker:
      - image: cimg/
