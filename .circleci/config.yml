version: 2.1

orbs:
  slack: circleci/slack@4.12.5

workflows:
  my-workflow:
    jobs:
      - build
      - test:
          requires:
            - build
      - deploy:
          requires:
            - build
            - test
      - slack/on-hold:
          context: slack-secrets
          requires:
            - build
          filters:
            branches:
              only:
                - main
      - notify-on-fail:
          context: slack-secrets
          requires:
            - deploy
          when:
            condition:
              or:
                - equal: [ cancelled, << pipeline.status >> ]
                - equal: [ failed, << pipeline.status >> ]

jobs:
  build:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run: echo "Building..."
      - slack/notify:
          event: fail
          custom: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ Build *cancelled* or *failed*"
                  }
                }
              ]
            }

  test:
    docker:
      - image: cimg/base:stable
    steps:
      - run: echo "Testing..."

  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - run: echo "Deploying..."
      - slack/notify:
          event: fail
          mentions: '@channel'
          template: basic_fail_1

  notify-on-fail:
    docker:
      - image: cimg/base:stable
    steps:
      - slack/notify:
          event: always
          custom: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "⚠️ Workflow completed with failures or cancellations"
                  }
                }
              ]
            }
