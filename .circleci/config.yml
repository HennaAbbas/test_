version: 2.1

jobs:
  deploy:
    docker:
      - image: cimg/base:stable
    parameters:
      environment:
        type: string
      region:
        type: string
    steps:
      - checkout
      - run:
          name: Deploy to << parameters.environment >>-<< parameters.region >>
          command: |
            echo "Deploying to << parameters.environment >> in << parameters.region >>"
            # Your deployment commands here

workflows:
  deploy-all-environments:
    jobs:
      - deploy:
          matrix:
            parameters:
              environment: ["dev", "staging", "prod"]
              region: ["us", "eu", "apac"]
          notify:
            on-success: true
            matrix-filter:
              environment: dev
              region: us
  
