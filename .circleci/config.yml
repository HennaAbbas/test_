version: 2.1

orbs:
  slack: circleci/slack@4.12.5

workflows:
  my-workflow:
    jobs:
      - build
      - test:
          requires:
            - build
      - deploy:
          requires:
            - test
      # This job runs if any upstream job fails
      - notify-on-failure:
          requires:
            - build: failed
 

jobs:
  build:
    docker:
      - image: cimg/base:stable
    steps:
      - run: echo "Building..."
      # Uncomment to test failure behavior:
      - run: wqr
      
  test:
    docker:
      - image: cimg/base:stable
    steps:
      - run: echo "Testing..."
      
  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - run: echo "Deploying..."
      
  notify-on-failure:
    docker:
      - image: cimg/base:stable
    steps:
      - slack/notify: 
          event: always
          template: basic_fail_1
