version: 2.1
# Define executors
executors:
  node-executor:
    docker:
      - image: cimg/node:18.17
    working_directory: ~/project
# Define jobs
jobs:
  # Job that always runs
  test:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Run tests
          command: echo "run test"
      - run:
          name: Run linting
          command: echo "run linting"

  build-very-long-job-name-to-test-it-needs-to-be-even-longer-than-long:
    executor: node-executor
    steps:
      - checkout

  # Job that always runs
  build:
    executor: node-executor
    steps:
      - checkout

      - run:
          name: Run tests
          command: echo "run test"
      - run:
          name: Run linting
          command: echo "run linting"

  # Conditional job - only runs on main branch
  deploy:
    executor: node-executor
    steps:

      - run:
          name: Deploy to production
          command: |
            echo "Deploying to production..."
            # Add your deployment commands here
            # e.g., aws s3 sync dist/ s3://my-bucket/
            # e.g., kubectl apply -f k8s/
            echo "Deployment completed!"

  # Another conditional job - only runs on feature branches
  integration-test:
    executor: node-executor
    steps:
      - run:
          name: Run integration tests
          command: |
            echo "Running integration tests..."
            # Add integration test commands here
          

# Define workflows
workflows:
  version: 2
  build-test-deploy:
    jobs:
      # These jobs run on every commit
      - test
      - build:
          requires:
            - test
      - build-very-long-job-name-to-test-it-needs-to-be-even-longer-than-long            
      - hold: # <<< A job that will require manual approval in the CircleCI web application.
          type: approval # This key-value pair will set your workflow to a status of "Needs Approval"
          requires: # We only run the "hold" job when test2 has succeeded
           - build
      # On approval of the `hold` job, any successive job that requires the `hold` job will run.
      # In this case, a user is manually triggering the deploy job.
      - deploy:
          requires:
            - hold            
      
      # Conditional job: Deploy only runs on main branch
      - deploy:
          requires:
            - build
          filters:
            branches:
              only: main
      

  

  # Alternative workflow that runs only on tags
  release:
    jobs:
      - test:
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - build:
          requires:
            - test
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - hold: # <<< A job that will require manual approval in the CircleCI web application.
          type: approval # This key-value pair will set your workflow to a status of "Needs Approval"
          requires: # We only run the "hold" job when test2 has succeeded
           - build
      # On approval of the `hold` job, any successive job that requires the `hold` job will run.
      # In this case, a user is manually triggering the deploy job.
      - deploy:
          requires:
            - hold
  
