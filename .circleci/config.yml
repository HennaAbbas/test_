version: 2.1

jobs:
  build:
    machine:
      image: ubuntu-2604:edge
    steps:
      - checkout
      - run:
          name: Hello World
          command: echo "Hello World"

  deploy:
    machine:
      image: ubuntu-2604:edge
    steps:
      - run:
          name: Deploy
          command: echo "Deploying to burger 🍔"

workflows:
  workflow:
    jobs:
      - build
      - hold:
          type: approval
          requires:
            - build
          filters:
            branches:
              only:
                - burger
      - deploy:
          requires:
            - hold
          filters:
            branches:
              only:
                - burger
