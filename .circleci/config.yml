version: 2.1

orbs:
  slack: circleci/slack@4.12.5

workflows:
  my-workflow:
    jobs:
      - build
      - test:
          requires:
            - build
      - deploy:
          requires:
            - build
            - test
      - notify-cancelled:
          requires:
            - build
            - test
            - deploy: 
              - canelled 
      - notify-failed:
          requires:
            - build
            - test
            - deploy:
              - failed


jobs:
  build:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run: echo "Building..."
      # Uncomment to demo failure:
      # - run: exit 1

  test:
    docker:
      - image: cimg/base:stable
    steps:
      - run: echo "Testing..."

  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - run: echo "Deploying..."

  notify-cancelled:
    docker:
      - image: cimg/base:stable
    steps:
      - slack/notify:
          event: always
          custom: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "⚠️ *Build Cancelled*\nWorkflow: ${CIRCLE_WORKFLOW_ID}\nBranch: ${CIRCLE_BRANCH}"
                  }
                }
              ]
            }

  notify-failed:
    docker:
      - image: cimg/base:stable
    steps:
      - slack/notify:
          event: always
          custom: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Build Failed*\nWorkflow: ${CIRCLE_WORKFLOW_ID}\nBranch: ${CIRCLE_BRANCH}"
                  }
                }
              ]
            }
