# config.yml — Reproduces NOT-702
# "Stale cancelled GitHub status persists for blocked approval jobs"
#
# HOW TO TRIGGER THE BUG:
#   1. Open a PR — this workflow runs.
#   2. While `build` or `test` are still running, push a new commit
#      (or manually cancel the workflow). Auto-cancel fires.
#   3. GitHub receives a "cancelled" status for `trigger-e2e`.
#   4. The NEW workflow starts. `trigger-e2e` enters **blocked** state
#      (waiting on build + test). CircleCI does NOT report a GitHub
#      status for blocked jobs, so the stale "cancelled" check is
#      never overwritten.
#   5. The commit appears to have failed checks ❌ — even though the
#      new workflow is running fine.
#
# ROOT CAUSE:
#   CircleCI only reports a GitHub status when a job reaches `on_hold`
#   (waiting for approval). It does NOT report when a job is `blocked`
#   (waiting on upstream dependencies). So the window between workflow
#   start and the job's upstream deps completing produces no status
#   write, leaving GitHub with the previous workflow's cancelled status.
#
# PREREQUISITES (project settings):
#   ✅ Auto-cancel redundant workflows  — ON
#   ✅ GitHub Status Updates            — ON
#   ✅ GitHub Checks                    — ON
# ============================================================

version: 2.1

# ── BUGGY WORKFLOW ───────────────────────────────────────────
# trigger-e2e is gated on real upstream work (build + test).
# It starts life as `blocked`, not `on_hold`, so CircleCI never
# writes a fresh "pending" status to GitHub on the new run.

jobs:
  build:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Build
          command: echo "Building..." && sleep 30   # simulate real work

  test:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Test
          command: echo "Testing..." && sleep 20    # simulate real work

  run-e2e:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: E2E
          command: echo "Running E2E tests..."

workflows:
  # ❌ BUGGY — reproduces the stale cancelled status
  run-tests-on-pull-request:
    jobs:
      - build

      - test:
          requires:
            - build

      # This job is BLOCKED (not on_hold) while build + test run.
      # Cancel the workflow now → GitHub records "cancelled" for trigger-e2e.
      # Re-run → trigger-e2e goes back to blocked → no status written → stale ❌
      - trigger-e2e:
          type: approval
          requires:
            - build
            - test

      - run-e2e:
          requires:
            - trigger-e2e


# ── FIXED WORKFLOW ───────────────────────────────────────────
# Insert a no-op job as the immediate parent of the approval.
# no-op completes instantly → approval jumps straight to `on_hold`
# → CircleCI reports a "pending/waiting for approval" status to
# GitHub immediately → overwrites any stale cancelled status. ✅
#
# The real upstream deps (build + test) are moved to the execution
# job (run-e2e-fixed) so they still gate actual work.
#
# Uncomment the section below and remove the buggy workflow above
# to apply the fix.

