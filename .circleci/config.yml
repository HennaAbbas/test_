version: 2.1

jobs:
  build:
    machine:
      image: ubuntu-2604:edge
    resource_class: medium  

    steps:
      - checkout
      - run:
          name: Build
          command: echo "Building..."

  test:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Test
          command: echo "Running tests..."

  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Deploy
          command: echo "Deploying..."

workflows:
  build-test-deploy:
    jobs:
      - build
      - test:
          requires:
            - build
      - hold-for-approval:
          type: approval
          requires:
            - test
      - deploy:
          requires:
            - hold-for-approval
